name: Build TransVideo Installer

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  windows-installer:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.10
        run: uv python install 3.10

      - name: Install project dependencies
        run: uv sync --locked

      - name: Bundle FFmpeg
        shell: pwsh
        run: |
          choco install ffmpeg --yes --no-progress
          New-Item -ItemType Directory -Force -Path ffmpeg | Out-Null
          Copy-Item (Get-Command ffmpeg.exe).Source ffmpeg/ffmpeg.exe -Force
          Copy-Item (Get-Command ffprobe.exe).Source ffmpeg/ffprobe.exe -Force
          Copy-Item (Get-Command ffplay.exe).Source ffmpeg/ffplay.exe -Force

      - name: Build portable app with PyInstaller
        run: uv run pyinstaller --clean --noconfirm packaging/TransVideo.spec

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build Windows installer
        run: iscc packaging/installer.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: TransVideo-Windows-Installer
          path: installer-dist/*.exe
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: installer-dist/*.exe
