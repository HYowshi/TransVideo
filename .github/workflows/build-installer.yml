name: Build TransVideo Installer

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  windows-installer:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.10
        run: uv python install 3.10

      - name: Build lightweight launcher
        run: uv run --with pyinstaller pyinstaller --clean --noconfirm --onefile --windowed --icon videotrans/styles/icon.ico --name TransVideo packaging/launcher.py

      - name: Prepare web installer payload
        shell: pwsh
        run: |
          $stage = "installer-staging/TransVideo"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          robocopy . $stage /MIR /XD .git .github .venv .pytest_cache tmp output logs models dist build installer-dist installer-staging __pycache__ /XF *.pyc *.pyo
          if ($LASTEXITCODE -gt 7) { exit $LASTEXITCODE }
          New-Item -ItemType Directory -Force -Path "$stage/bin" | Out-Null
          Copy-Item dist/TransVideo.exe "$stage/TransVideo.exe" -Force
          Copy-Item (Get-Command uv.exe).Source "$stage/bin/uv.exe" -Force
          exit 0

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build Windows installer
        run: iscc packaging/web-installer.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: TransVideo-Windows-Installer
          path: installer-dist/*.exe
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: installer-dist/*.exe
