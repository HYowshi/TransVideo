name: Build TransVideo Installer

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: transvideo-installer-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-installer:
    runs-on: windows-latest
    timeout-minutes: 120
    env:
      HAS_WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE_PFX != '' && secrets.WINDOWS_CERTIFICATE_PASSWORD != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.10
        run: uv python install 3.10

      - name: Validate packaging inputs
        shell: pwsh
        run: |
          $required = @(
            "packaging/launcher.py",
            "packaging/version_info.txt",
            "packaging/web-installer.iss",
            "videotrans/styles/icon.ico",
            "pyproject.toml",
            "uv.lock"
          )
          foreach ($path in $required) {
            if (!(Test-Path $path)) { throw "Missing required packaging file: $path" }
          }

      - name: Build lightweight launcher
        run: uv run --with pyinstaller pyinstaller --clean --noconfirm --onefile --windowed --icon videotrans/styles/icon.ico --version-file packaging/version_info.txt --name TransVideo packaging/launcher.py

      - name: Sign launcher if certificate is configured
        if: ${{ env.HAS_WINDOWS_CERTIFICATE == 'true' }}
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_PFX: ${{ secrets.WINDOWS_CERTIFICATE_PFX }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $certPath = "$env:RUNNER_TEMP\transvideo.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_PFX))
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match "\\x64\\signtool.exe$" } |
            Select-Object -First 1 -ExpandProperty FullName
          & $signtool sign /f $certPath /p $env:WINDOWS_CERTIFICATE_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 dist\TransVideo.exe

      - name: Prepare web installer payload
        shell: pwsh
        run: |
          $stage = "installer-staging/TransVideo"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          robocopy . $stage /MIR /XD .git .github .venv .pytest_cache tmp output logs models dist build installer-dist installer-staging __pycache__ /XF *.pyc *.pyo
          if ($LASTEXITCODE -gt 7) { exit $LASTEXITCODE }
          New-Item -ItemType Directory -Force -Path "$stage/bin" | Out-Null
          Copy-Item dist/TransVideo.exe "$stage/TransVideo.exe" -Force
          Copy-Item (Get-Command uv.exe).Source "$stage/bin/uv.exe" -Force
          exit 0

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build Windows installer
        run: iscc packaging/web-installer.iss

      - name: Sign installer if certificate is configured
        if: ${{ env.HAS_WINDOWS_CERTIFICATE == 'true' }}
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_PFX: ${{ secrets.WINDOWS_CERTIFICATE_PFX }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $certPath = "$env:RUNNER_TEMP\transvideo.pfx"
          if (!(Test-Path $certPath)) {
            [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_PFX))
          }
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match "\\x64\\signtool.exe$" } |
            Select-Object -First 1 -ExpandProperty FullName
          Get-ChildItem installer-dist\*.exe | ForEach-Object {
            & $signtool sign /f $certPath /p $env:WINDOWS_CERTIFICATE_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 $_.FullName
          }

      - name: Create SHA256 checksums
        shell: pwsh
        run: |
          Get-ChildItem installer-dist\*.exe | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($_.Name)"
          } | Set-Content installer-dist\SHA256SUMS.txt -Encoding ascii

      - name: Create release notes
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          @"
          TransVideo $tag

          - Web installer nhe, runtime tai sau lan mo dau.
          - Co checksum SHA256 de kiem tra file tai ve.
          - Neu cau hinh WINDOWS_CERTIFICATE_PFX va WINDOWS_CERTIFICATE_PASSWORD, workflow se ky so exe/installer.
          - BandMatch auto-tune duoc bat trong pipeline long tieng.
          "@ | Set-Content installer-dist\RELEASE_NOTES.txt -Encoding utf8

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: TransVideo-Windows-Installer
          path: |
            installer-dist/*.exe
            installer-dist/SHA256SUMS.txt
            installer-dist/RELEASE_NOTES.txt
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body_path: installer-dist/RELEASE_NOTES.txt
          files: |
            installer-dist/*.exe
            installer-dist/SHA256SUMS.txt
            installer-dist/RELEASE_NOTES.txt
